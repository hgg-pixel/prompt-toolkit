  {cat:"interaction",name:"视差滚动",en:"Parallax Scrolling",desc:"前景和背景以不同速度滚动。增加深度感和沉浸感。",prompt:"parallax scrolling effect, layered depth with foreground moving faster than background",tags:["ui"]},
  {cat:"interaction",name:"骨架屏",en:"Skeleton Screen",desc:"内容加载前显示灰色占位块。比spinner好——用户能预判布局，降低等待焦虑。",prompt:"skeleton loading screen, gray placeholder blocks matching content layout, smooth fade-in reveal",tags:["ui"]},
  {cat:"interaction",name:"反馈层级",en:"Feedback Hierarchy",desc:"操作成功=绿色/微弹 警告=黄色/震动 错误=红色/摇晃。视觉+动效+颜色三层反馈。",prompt:"multi-layered feedback system, success with green pulse, error with red shake, warning with amber glow",tags:["ui"]},
  {cat:"interaction",name:"手势引导",en:"Gesture Affordance",desc:"UI元素暗示\"我可以被拖/滑/捏\"。不用教程，用户自然知道怎么操作。",prompt:"intuitive gesture affordance, drag handle visual cue, swipeable card with peek preview",tags:["ui"]}
];

const CAT_NAMES = {
  composition:"构成",lighting:"光影",color:"色彩",photography:"摄影",
  art:"美术",film:"影视",music:"音乐",interaction:"交互"
};
const TAG_LABELS = {img:"图像",vid:"视频",aud:"音频",ui:"交互"};

let activeFilter = "all";

function render(items){
  const grouped = {};
  items.forEach(t => {
    if(!grouped[t.cat]) grouped[t.cat]=[];
    grouped[t.cat].push(t);
  });
  const el = document.getElementById("content");
  if(items.length===0){el.innerHTML='<p style="color:#555;text-align:center;padding:40px">无匹配结果</p>';return;}
  el.innerHTML = Object.keys(grouped).map(cat => `
    <div class="cat" data-cat="${cat}">
      <div class="cat-title open" onclick="toggleCat(this)">${CAT_NAMES[cat]}<span class="count">${grouped[cat].length}</span></div>
      <div class="cat-body show">
        ${grouped[cat].map(t => `
          <div class="term">
            <div class="term-head">
              <span class="term-name">${t.name}</span>
              <span class="term-en">${t.en}</span>
            </div>
            <div class="term-desc">${t.desc}</div>
            <div>${t.tags.map(tg => `<span class="tag ${tg}">${TAG_LABELS[tg]}</span>`).join("")}</div>
            <div class="prompt-box" onclick="copyPrompt(this)">${t.prompt}</div>
          </div>
        `).join("")}
      </div>
    </div>
  `).join("");
}

function filter(){
  const q = document.getElementById("search").value.toLowerCase();
  let items = DB;
  if(activeFilter!=="all") items = items.filter(t=>t.cat===activeFilter);
  if(q) items = items.filter(t => 
    t.name.toLowerCase().includes(q) || 
    t.en.toLowerCase().includes(q) || 
    t.desc.toLowerCase().includes(q) ||
    t.prompt.toLowerCase().includes(q) ||
    t.tags.some(tg => tg.includes(q))
  );
  render(items);
}

function setFilter(el){
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  el.classList.add("active");
  activeFilter = el.dataset.f;
  filter();
}

function toggleCat(el){
  el.classList.toggle("open");
  el.nextElementSibling.classList.toggle("show");
}

function copyPrompt(el){
  navigator.clipboard.writeText(el.textContent).then(()=>{
    el.style.borderLeftColor="#51cf66";
    setTimeout(()=>el.style.borderLeftColor="#ce93d8",600);
  });
}

render(DB);
</script>
</body>
</html>
